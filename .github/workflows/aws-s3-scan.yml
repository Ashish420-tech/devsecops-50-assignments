name: S3 Bucket Security Audit and Remediation

on:
  push:
    branches:
      - main
      - assignment-43-s3-security-audit
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Scan
        run: |
          mkdir -p reports
          checkov -d terraform \
            --framework terraform \
            --output sarif \
            --output-file-path reports/aws-s3-results.sarif \
            --soft-fail false

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/aws-s3-results.sarif

      - name: Enforce Security Gate
        run: |
          if grep -q '"severity": "CRITICAL"' reports/aws-s3-results.sarif; then
            echo "❌ Critical issues found"
            exit 1
          else
            echo "✅ No critical issues"
          fi
