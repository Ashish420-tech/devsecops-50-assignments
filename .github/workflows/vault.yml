name: Vault Secrets Integration

on:
  push:
    branches:
      - assignment-05
  workflow_dispatch:

jobs:
  vault-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Vault CLI
        run: |
          sudo apt update
          sudo apt install -y unzip
          wget https://releases.hashicorp.com/vault/1.15.0/vault_1.15.0_linux_amd64.zip
          unzip vault_1.15.0_linux_amd64.zip
          sudo mv vault /usr/local/bin/

      - name: Start Vault Dev Server
        run: |
          vault server -dev -dev-root-token-id=root &
          sleep 5

      - name: Set Vault Environment
        run: |
          echo "VAULT_ADDR=http://127.0.0.1:8200" >> $GITHUB_ENV
          echo "VAULT_TOKEN=root" >> $GITHUB_ENV

      - name: Store Secret in Vault
        run: |
          vault kv put secret/database \
            db_username=root \
            db_password=password123 \
            db_name=devsecops_db \
            db_host=localhost

      - name: Fetch Secret from Vault
        run: |
          vault kv get secret/database
