name: 🚀 Assignment 41 - Kubernetes Runtime Security

on:
push:
branches:
- assignment-41-kubernetes-runtime-security
paths:
- 'k8s/**'
- '.github/workflows/kubernetes-security.yml'
pull_request:
branches:
- main
schedule:
- cron: '0 8 * * 1'   # Weekly scan (Monday 8 AM)

jobs:
security-scan:
name: Runtime Security Scan
runs-on: ubuntu-latest

```
permissions:
  contents: read
  security-events: write

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  # Step 1: Validate YAML files
  - name: Validate Kubernetes manifests
    run: |
      echo "🔍 Validating Kubernetes YAML files..."
      for file in k8s/manifests/*.yaml; do
        echo "Checking $file"
        cat $file >/dev/null
      done

  # Step 2: Security Scan (Policy Checks)
  - name: Run Kubernetes Security Scan
    run: |
      echo "🚀 Running Kubernetes security checks..."

      FAIL=0

      # Check for privileged containers
      if grep -r "privileged: true" k8s/; then
        echo "❌ Critical: Privileged container found"
        FAIL=1
      fi

      # Check for root user enforcement
      if ! grep -r "runAsNonRoot: true" k8s/; then
        echo "❌ Critical: Missing runAsNonRoot configuration"
        FAIL=1
      fi

      # Generate SARIF report (basic format)
      cat <<EOF > kubernetes-results.sarif
      {
        "version": "2.1.0",
        "runs": []
      }
      EOF

      # Fail pipeline if critical issues found
      if [ "$FAIL" -eq 1 ]; then
        echo "🚨 Security gate failed!"
        exit 1
      else
        echo "✅ Security checks passed"
      fi

  # Step 3: Upload SARIF to GitHub Security Dashboard
  - name: Upload SARIF Results
    uses: github/codeql-action/upload-sarif@v3
    if: always()
    with:
      sarif_file: kubernetes-results.sarif

  # Step 4: Comment on Pull Request
  - name: Comment PR with results
    if: github.event_name == 'pull_request'
    uses: actions/github-script@v7
    with:
      script: |
        github.rest.issues.createComment({
          issue_number: context.issue.number,
          owner: context.repo.owner,
          repo: context.repo.repo,
          body: "## 🔐 Kubernetes Security Scan Completed\n\n- Privileged containers: Checked\n- Non-root enforcement: Checked\n\nSee Security tab for SARIF results."
        })
```
