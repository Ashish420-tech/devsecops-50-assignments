name: Advanced DevSecOps Pipeline (BuildKit + SBOM + Cosign)

on:
  push:
    branches:
      - main
      - assignment-44-docker-buildkit-security
  pull_request:
    branches:
      - main
      - assignment-44-docker-buildkit-security

jobs:
  security:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version
      - name: Install Cosign
        run: |
          COSIGN_VERSION=$(curl -s https://api.github.com/repos/sigstore/cosign/releases/latest | grep tag_name | cut -d '"' -f4)
          curl -Lo cosign https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64
          chmod +x cosign
          sudo mv cosign /usr/local/bin/
          cosign version
      - name: Build Docker Image
        run: |
          export DOCKER_BUILDKIT=1
          docker build -t devsecops-app:latest ./assignment-44-docker-buildkit-security/app

      - name: Generate SBOM
        run: |
          syft devsecops-app:latest -o json > sbom.json

      - name: Scan with Trivy
        run: |
          trivy image --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-results.sarif \
            devsecops-app:latest || true

      - name: Fail on Critical
        run: |
          COUNT=$(grep -c '"level":"error"' trivy-results.sarif || true)
          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found"
            exit 1
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Sign Image
        if: github.ref == 'refs/heads/main'
        run: |
          cosign sign --yes devsecops-app:latest

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
