name: Capstone DevSecOps Pipeline

on:
  push:
    branches: [ main, assignment-50-capstone ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        run: |
          docker run --rm -v $(pwd):/repo zricethezav/gitleaks detect --source /repo/assignment-50-devsecops-capstone || true

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy
        run: |
          trivy fs assignment-50-devsecops-capstone --exit-code 1 --severity CRITICAL,HIGH
