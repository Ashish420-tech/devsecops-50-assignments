name: Capstone DevSecOps Pipeline

on:
  push:
    branches: [ main, assignment-50-capstone ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        run: |
          docker run --rm -v $(pwd):/repo zricethezav/gitleaks detect --source /repo/assignment-50-devsecops-capstone || true

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      - name: Run Trivy
        run: |
          trivy fs assignment-50-devsecops-capstone --exit-code 1 --severity CRITICAL,HIGH
