name: Capstone DevSecOps Pipeline

on:
  push:
    paths:
      - 'assignment-50-devsecops-capstone/**'

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        run: |
          docker run --rm -v $(pwd):/repo zricethezav/gitleaks detect --source /repo/assignment-50-devsecops-capstone

      - name: Run Trivy
        run: |
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb
          trivy fs assignment-50-devsecops-capstone
