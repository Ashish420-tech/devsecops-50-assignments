name: Snyk Security Scan

on:
  push:
    branches:
      - main
      - assignment-36-snyk-security
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: assignment-36-snyk-security   # 🔥 IMPORTANT FIX

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif --severity-threshold=high

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: assignment-36-snyk-security/snyk.sarif   # 🔥 IMPORTANT FIX
