name: Snyk Security Scan

on:
  push:
    paths:
      - "assignment-48-devsecops-vuln-mgmt/**"
    branches:
      - main
      - assignment-36-snyk-security
  pull_request:
    branches: [main]
    paths:
      - "assignment-48-devsecops-vuln-mgmt/**"

jobs:
  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write   # required for SARIF upload

    defaults:
      run:
        working-directory: assignment-36-snyk-security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Scan (fail on HIGH/CRITICAL)
        run: snyk test --file=package.json --sarif-file-output=snyk.sarif --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload SARIF results to GitHub Security Dashboard
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: assignment-36-snyk-security/snyk.sarif

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "✅ Snyk security scan completed. Check the Security tab for details."
            })
