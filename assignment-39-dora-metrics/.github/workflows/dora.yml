name: DORA Metrics Pipeline

on:
  push:
    branches: [ assignment-39-dora-metrics ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulate Build
        run: echo "Building app..."

      - name: Simulate Deployment
        run: |
          echo "Deploying app..."
          date > deployment.txt

      # 🔴 ADD THIS (CRITICAL STEP)
      - name: Simulate Security Scan
        run: |
          echo "Running security scan..."
          echo '{"severity":"CRITICAL"}' > results.json

      # 🔴 ADD THIS (FAIL PIPELINE)
      - name: Fail on Critical Issues
        run: |
          if grep -q CRITICAL results.json; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          else
            echo "✅ No critical issues"
          fi

      - name: Track Deployment Frequency
        run: |
          echo "Deployment recorded at $(date)" >> dora_metrics.log

      - name: Upload Metrics Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-metrics
          path: dora_metrics.log
