name: Image Security - Cosign Signing

on:
push:
branches:
- main

jobs:
sign-image:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Install Cosign
    uses: sigstore/cosign-installer@v3

  - name: Log in to GHCR
    run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

  - name: Build Docker Image
    run: docker build -t ghcr.io/${{ github.repository_owner }}/devsecops-app:latest ./app

  - name: Push Docker Image
    run: docker push ghcr.io/${{ github.repository_owner }}/devsecops-app:latest

  - name: Sign Image with Cosign
    env:
      COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
    run: |
      echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
      cosign sign --key cosign.key ghcr.io/${{ github.repository_owner }}/devsecops-app:latest
```
