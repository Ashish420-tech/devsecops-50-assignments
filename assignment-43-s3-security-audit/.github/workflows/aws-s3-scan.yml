name: S3 Bucket Security Audit and Remediation

on:
  push:
    branches: [ main, assignment-43-s3-security-audit ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # ✅ correct placement

jobs:
  security-scan:
    name: Cloud Security Scan (S3 + Terraform)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: |
          pip install checkov

      - name: Run Checkov Scan (Terraform S3)
        run: |
          mkdir -p reports
          checkov -d terraform/ \
            --framework terraform \
            --output sarif \
            --output-file-path reports/aws-s3-results.sarif \
            --soft-fail false

      - name: Upload SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/aws-s3-results.sarif

      - name: Enforce Security Gate
        run: |
          CRITICAL=$(grep -c '"severity": "CRITICAL"' reports/aws-s3-results.sarif || true)
          echo "Critical Issues: $CRITICAL"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found. Failing pipeline."
            exit 1
          else
            echo "✅ No critical vulnerabilities."
          fi
