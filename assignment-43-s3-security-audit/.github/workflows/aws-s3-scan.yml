name: S3 Bucket Security Audit and Remediation

on:
  push:
    branches: [ main, assignment-43-s3-security-audit ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'   # Weekly scan (Monday)

jobs:
  security-scan:
    name: Cloud Security Scan (S3 + Terraform)
    runs-on: ubuntu-latest

    # ✅ FIXED PERMISSIONS
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      # -----------------------------
      # Checkout Code
      # -----------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------
      # Setup Python
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------
      # Install Checkov
      # -----------------------------
      - name: Install Checkov
        run: |
          pip install checkov

      # -----------------------------
      # Run Security Scan
      # -----------------------------
      - name: Run Checkov Scan (Terraform S3)
        run: |
          echo "Running S3 Security Scan..."
          checkov -d terraform/ \
            --framework terraform \
            --output sarif \
            --output-file-path reports/aws-s3-results.sarif \
            --soft-fail false

      # -----------------------------
      # Upload SARIF to GitHub
      # -----------------------------
      - name: Upload SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/aws-s3-results.sarif

      # -----------------------------
      # Enforce Security Gate
      # -----------------------------
      - name: Enforce Security Gate
        run: |
          CRITICAL=$(grep -c '"severity": "CRITICAL"' reports/aws-s3-results.sarif || true)
          echo "Critical Issues: $CRITICAL"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found. Failing pipeline."
            exit 1
          else
            echo "✅ No critical vulnerabilities."
          fi
