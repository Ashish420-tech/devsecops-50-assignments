name: OPA Policy Check

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  opa-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OPA
        run: |
          wget https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa_linux_amd64_static
          sudo mv opa_linux_amd64_static /usr/local/bin/opa

      - name: Run OPA Policy Check (PASS case)
        run: |
          echo '{"role":"user","method":"GET","path":"/users"}' | opa eval --stdin-input --data policies 'data.authz.allow'

      - name: Run OPA Policy Check (FAIL if violation)
        run: |
          RESULT=$(echo '{"role":"user","method":"POST","path":"/users"}' | opa eval --stdin-input --data policies 'data.authz.allow' | jq -r '.result[0].expressions[0].value')

          echo "Policy result: $RESULT"

          if [ "$RESULT" = "false" ]; then
            echo "❌ Policy violation detected!"
            exit 1
          fi
