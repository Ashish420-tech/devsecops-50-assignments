apiVersion: v1
kind: Pod
metadata:
  name: secure-pod
  labels:
    app: secure
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: nginx
      image: nginx:1.25
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
